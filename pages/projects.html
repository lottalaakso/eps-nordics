    <div id="lightbox" class="lightbox-modal" onclick="handleOutsideClick(event)">
        <span class="close-btn" onclick="closeLightbox()">&times;</span>

            <img id="lightbox-img" src="" alt="Full size project">

    <script>
        let currentImgIndex = 0;
        const allImages = [];

        document.addEventListener("DOMContentLoaded", () => {
            const images = document.querySelectorAll(".project-item img");
            images.forEach((img) => {
                allImages.push({ src: img.src, alt: img.alt });
            });
        });

        function openLightbox(element) {
            const lightbox = document.getElementById("lightbox");
            currentImgIndex = allImages.findIndex(img => img.src === element.src);

            lightbox.style.display = "flex";
            updateLightbox();
            document.body.style.overflow = "hidden"; // Estää taustan skrollauksen
        }

        function updateLightbox() {
            const img = document.getElementById("lightbox-img");
            const caption = document.getElementById("lightbox-caption");
            img.src = allImages[currentImgIndex].src;
            caption.innerText = allImages[currentImgIndex].alt;
        }

        // Vaihtaa kuvaa (nuolet)
        function changeSlide(n) {
            currentImgIndex += n;
            if (currentImgIndex >= allImages.length) currentImgIndex = 0;
            if (currentImgIndex < 0) currentImgIndex = allImages.length - 1;
            updateLightbox();
        }

        // Sulkee Lightboxin
        function closeLightbox() {
            document.getElementById("lightbox").style.display = "none";
            document.body.style.overflow = "auto"; // Palauttaa skrollauksen
        }

        // Sulkee modaalin klikattaessa mustaa taustaa
        function handleOutsideClick(e) {
            if (e.target.id === "lightbox") {
                closeLightbox();
            }
        }

        // Näppäimistötuki (Esc ja nuolet)
        document.addEventListener("keydown", (e) => {
            const lightbox = document.getElementById("lightbox");
            if (lightbox.style.display === "flex") {
                if (e.key === "Escape") closeLightbox();
                if (e.key === "ArrowRight") changeSlide(1);
                if (e.key === "ArrowLeft") changeSlide(-1);
            }
        });
    </script>
